<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a2540">
  <meta name="description" content="مشاركة المحتوى - مجلة آفاق الصحية">
  <title>مشاركة المحتوى | مجلة آفاق الصحية</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@600;800;900&family=Tajawal:wght@500;700;800&family=Almarai:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f0f7f0 0%, #e8f5e9 100%);
      min-height: 100vh;
    }
    
    .share-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .share-container {
      background: white;
      border-radius: 32px;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      animation: fadeInUp 0.5s ease;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .share-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .share-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #0a2540, #0066cc);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0,102,204,0.3);
    }
    
    .share-icon i { font-size: 2.5rem; color: white; }
    
    .share-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0a2540;
      margin-bottom: 0.5rem;
      font-family: 'Cairo', sans-serif;
    }
    
    .share-subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    
    .share-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .form-label {
      font-weight: 600;
      color: #334155;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-label i { color: #0066cc; font-size: 0.9rem; }
    
    .form-input, .form-textarea {
      padding: 0.875rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s;
      background: #f8fafc;
    }
    
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #0066cc;
      background: white;
      box-shadow: 0 0 0 4px rgba(0,102,204,0.1);
    }
    
    .form-textarea { min-height: 120px; resize: vertical; }
    
    .share-preview {
      background: #f0f7f0;
      border-radius: 20px;
      padding: 1.5rem;
      border-right: 4px solid #2e7d32;
      margin: 0.5rem 0;
    }
    
    .share-preview h3 {
      font-size: 1rem;
      color: #1b5e20;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .share-preview p {
      color: #475569;
      line-height: 1.6;
      margin: 0;
    }
    
    .share-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border: none;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      font-family: inherit;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #0066cc, #004d99);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,102,204,0.3);
    }
    
    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }
    
    .btn-secondary:hover { background: #cbd5e1; transform: translateY(-2px); }
    
    .btn-success {
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      color: white;
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46,125,50,0.3);
    }
    
    .hidden { display: none; }
    
    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 1rem;
      border-radius: 16px;
      text-align: center;
      margin-top: 1.5rem;
      animation: slideIn 0.3s ease;
      border-right: 4px solid #2e7d32;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .back-home {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }
    
    .back-home a {
      color: #0066cc;
      text-decoration: none;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .back-home a:hover { color: #004d99; text-decoration: underline; }
    
    @media (max-width: 640px) {
      .share-container { padding: 1.5rem; margin: 1rem; }
      .share-title { font-size: 1.5rem; }
      .share-actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="share-page">
    <div class="share-container">
      <div class="share-header">
        <div class="share-icon"><i class="fas fa-share-alt"></i></div>
        <h1 class="share-title">مشاركة المحتوى</h1>
        <p class="share-subtitle">شارك هذا المحتوى مع الآخرين عبر الروابط أو وسائل التواصل</p>
      </div>
      
      <form class="share-form" id="shareForm">
        <div class="form-group">
          <label class="form-label" for="shareTitle"><i class="fas fa-heading"></i> العنوان</label>
          <input type="text" id="shareTitle" name="title" class="form-input" placeholder="أدخل عنوان المحتوى" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="shareText"><i class="fas fa-align-left"></i> النص</label>
          <textarea id="shareText" name="text" class="form-textarea" placeholder="أدخل نص المحتوى..." required></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="shareUrl"><i class="fas fa-link"></i> الرابط (اختياري)</label>
          <input type="url" id="shareUrl" name="url" class="form-input" placeholder="https://...">
        </div>
        
        <div class="share-preview" id="preview">
          <h3><i class="fas fa-eye"></i> معاينة</h3>
          <p id="previewText">سيظهر هنا نص المحتوى...</p>
        </div>
        
        <div class="share-actions">
          <button type="submit" class="btn btn-primary"><i class="fas fa-copy"></i> نسخ الرابط</button>
          <button type="button" class="btn btn-secondary" onclick="window.history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
          <button type="button" class="btn btn-success hidden" id="nativeShare" onclick="shareNative()"><i class="fas fa-share-alt"></i> مشاركة أصلية</button>
        </div>
      </form>
      
      <div class="success-message hidden" id="successMsg"><i class="fas fa-check-circle"></i> ✅ تم نسخ الرابط بنجاح!</div>
      
      <div class="back-home">
        <a href="/index.html"><i class="fas fa-home"></i> العودة إلى الصفحة الرئيسية</a>
      </div>
    </div>
  </main>
  
  <script>
    // قراءة الباراميترات من URL
    const urlParams = new URLSearchParams(window.location.search);
    const prefillTitle = urlParams.get('title') || '';
    const prefillText = urlParams.get('text') || '';
    const prefillUrl = urlParams.get('url') || window.location.origin + '/';
    
    if (prefillTitle) document.getElementById('shareTitle').value = prefillTitle;
    if (prefillText) document.getElementById('shareText').value = prefillText;
    if (prefillUrl) document.getElementById('shareUrl').value = prefillUrl;
    
    // تحديث المعاينة
    const titleInput = document.getElementById('shareTitle');
    const textInput = document.getElementById('shareText');
    const urlInput = document.getElementById('shareUrl');
    const previewTitle = document.querySelector('.share-preview h3');
    const previewText = document.getElementById('previewText');
    
    function updatePreview() {
      previewTitle.innerHTML = titleInput.value ? `<i class="fas fa-eye"></i> ${titleInput.value}` : '<i class="fas fa-eye"></i> معاينة';
      previewText.textContent = textInput.value || 'سيظهر هنا نص المحتوى...';
    }
    
    titleInput.addEventListener('input', updatePreview);
    textInput.addEventListener('input', updatePreview);
    updatePreview();
    
    // إظهار رسالة النجاح
    function showSuccess() {
      const successMsg = document.getElementById('successMsg');
      successMsg.classList.remove('hidden');
      setTimeout(() => successMsg.classList.add('hidden'), 3000);
    }
    
    // نسخ الرابط والمشاركة
    document.getElementById('shareForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = titleInput.value;
      const text = textInput.value;
      const url = urlInput.value || window.location.origin + '/';
      
      const shareData = { 
        title: `${title} | مجلة آفاق الصحية`, 
        text: text, 
        url: url 
      };
      
      // استخدام Web Share API إذا متاح
      if (navigator.share) {
        try {
          await navigator.share({
            title: shareData.title,
            text: shareData.text,
            url: shareData.url
          });
          showSuccess();
          return;
        } catch (err) {
          console.log('Web Share API failed:', err);
        }
      }
      
      // نسخ إلى الحافظة
      const fullUrl = `${shareData.url}?title=${encodeURIComponent(title)}&text=${encodeURIComponent(text)}`;
      
      try {
        await navigator.clipboard.writeText(fullUrl);
        showSuccess();
      } catch (err) {
        console.error('Copy failed:', err);
        // طريقة احتياطية
        const textArea = document.createElement('textarea');
        textArea.value = fullUrl;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showSuccess();
      }
    });
    
    // المشاركة الأصلية
    function shareNative() {
      const title = titleInput.value;
      const text = textInput.value;
      const url = urlInput.value || window.location.origin + '/';
      
      if (navigator.share) {
        navigator.share({
          title: `${title} | مجلة آفاق الصحية`,
          text: text,
          url: url
        }).catch(err => console.log('Share cancelled:', err));
      }
    }
    
    // حفظ المشاركات في localStorage
    function saveShareToLocal() {
      const title = titleInput.value;
      const text = textInput.value;
      const url = urlInput.value;
      
      if (title && text) {
        const shares = JSON.parse(localStorage.getItem('shared_articles') || '[]');
        shares.push({
          title: title,
          text: text,
          url: url,
          date: new Date().toISOString()
        });
        // الاحتفاظ بآخر 20 مشاركة فقط
        if (shares.length > 20) shares.shift();
        localStorage.setItem('shared_articles', JSON.stringify(shares));
      }
    }
    
    document.getElementById('shareForm').addEventListener('submit', saveShareToLocal);
    
    // إظهار زر المشاركة الأصلية إذا متاح
    if (navigator.share) {
      document.getElementById('nativeShare').classList.remove('hidden');
    }
  </script>
</body>
</html>
