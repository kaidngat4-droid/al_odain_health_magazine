<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - آفاق الصحية</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #b3e5fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h2 { color: #1b5e20; margin-bottom: 20px; }
        input {
            display: block;
            width: 250px;
            padding: 12px;
            margin: 10px auto;
            border: 1px solid #ddd;
            border-radius: 25px;
        }
        button {
            background: #2e7d32;
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .info { margin-top: 20px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 لوحة التحكم</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div class="info">admin / admin123</div>
    </div>
    <script>
        function login() {
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('admin', 'true');
                window.location.href = 'manager.html';
            } else {
                alert('خطأ في اسم المستخدم أو كلمة المرور');
            }
        }
    </script>
</body>
</html>
