<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}مجلة العدين الصحية - منصة طبية متخصصة{% endblock %}">
    <meta name="keywords" content="{% block keywords %}مجلة صحية, العدين, الصحة والبيئة{% endblock %}">
    <meta name="author" content="مكتب الصحة والبيئة - العدين">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}مجلة العدين الصحية{% endblock %}">
    <meta property="og:description" content="{% block og_description %}منصة طبية متخصصة{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    
    <title>{% block title %}مجلة العدين الصحية{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    {% block extra_css %}{% endblock %}
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
</head>
<body>
    <!-- Header -->
    {% include 'templates/header.html' %}
    
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include 'templates/footer.html' %}
    
    <!-- Scripts -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
